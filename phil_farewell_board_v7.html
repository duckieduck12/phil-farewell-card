<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f0e8;font-family:'DM Sans',sans-serif;color:#1a1208;}
.hero{background:#1a1208;padding:3rem 2rem 2.5rem;text-align:center;}
.hero-eyebrow{font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:400;letter-spacing:0.22em;color:#9a8060;text-transform:uppercase;margin-bottom:1.2rem;display:flex;align-items:center;justify-content:center;gap:10px;}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:24px;height:1px;background:#9a8060;}
.hero h1{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;color:#f0e8d8;line-height:1.05;}
.hero h1 em{font-style:italic;color:#c9a96e;display:block;font-size:3.2rem;}
.hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:#7a6848;margin-top:0.9rem;}
.hero-divider{width:40px;height:1px;background:#c9a96e;margin:1.2rem auto 0;}
.form-section{background:#f5f0e8;padding:2rem 1.5rem;}
.form-card{background:#fff;border:1px solid #e8dfd0;border-radius:4px;padding:1.75rem;max-width:720px;margin:0 auto;}
.form-card h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400;color:#1a1208;margin-bottom:1.25rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:0.68rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#9a8060;}
.form-input,.form-textarea{font-family:'DM Sans',sans-serif;font-size:0.88rem;border:1px solid #ddd5c5;border-radius:3px;padding:0.55rem 0.75rem;color:#1a1208;background:#fff;outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-textarea:focus{border-color:#c9a96e;}
.form-textarea{resize:vertical;min-height:90px;width:100%;}
.emoji-label{font-size:0.68rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#9a8060;margin-bottom:6px;}
.emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.emoji-btn{width:38px;height:38px;border:1px solid #e0d5c0;border-radius:3px;background:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s;user-select:none;}
.emoji-btn:hover{border-color:#c9a96e;background:#fdf8f0;}
.emoji-btn.active{border-color:#c9a96e;background:#fdf8f0;box-shadow:0 0 0 2px #c9a96e;}
.selected-preview{font-size:0.78rem;color:#9a8060;margin-bottom:1.25rem;}
.selected-preview span{font-size:1.1rem;vertical-align:middle;}
.media-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;}
.upload-btn{border:1px dashed #d0c5b0;border-radius:3px;padding:0.6rem 0.8rem;font-size:0.78rem;color:#9a8060;background:#fdf9f4;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all 0.12s;position:relative;overflow:hidden;}
.upload-btn:hover{border-color:#c9a96e;color:#8a6030;}
.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.submit-btn{background:#1a1208;color:#f0e8d8;border:none;border-radius:3px;padding:0.7rem 1.75rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background 0.15s;}
.submit-btn:hover{background:#2e2010;}
.submit-btn .star{color:#c9a96e;font-size:0.9rem;}
.media-preview{margin-top:6px;border-radius:3px;overflow:hidden;max-height:80px;}
.media-preview img,.media-preview video{width:100%;max-height:80px;object-fit:cover;}
.msgs-section{padding:1.75rem 1.5rem 2.5rem;max-width:720px;margin:0 auto;}
.msgs-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.25rem;}
.msgs-header h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:400;color:#1a1208;}
.sig-count{font-size:0.75rem;color:#9a8060;letter-spacing:0.06em;}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.msg-card{background:#fffff8;border:1px solid #e8dfd0;border-radius:4px;padding:1.1rem;position:relative;animation:fadeUp 0.3s ease;}
.msg-card:hover .delete-btn{opacity:1;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.delete-btn{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:#fff;border:1px solid #e0d0c0;color:#c08060;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.15s;line-height:1;}
.delete-btn:hover{background:#fff0ec;border-color:#e07050;color:#c04020;}
.msg-emoji{font-size:1.4rem;margin-bottom:0.6rem;display:block;}
.msg-card-media{border-radius:3px;overflow:hidden;margin-bottom:0.7rem;max-height:130px;}
.msg-card-media img,.msg-card-media video{width:100%;max-height:130px;object-fit:cover;}
.msg-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;line-height:1.6;color:#3a2c18;margin-bottom:0.9rem;}
.msg-sig{border-top:1px solid #ede5d5;padding-top:0.65rem;}
.msg-author{font-size:0.78rem;font-weight:500;color:#1a1208;}
.msg-role{font-size:0.7rem;color:#9a8060;margin-top:1px;}
.empty-msg{text-align:center;padding:2rem;color:#b0a080;font-size:0.85rem;grid-column:1/-1;font-style:italic;}
.toast{position:fixed;bottom:1.2rem;right:1.2rem;background:#1a1208;color:#f0e8d8;padding:0.6rem 1rem;border-radius:3px;font-size:0.8rem;z-index:999;animation:fadeUp 0.25s ease;}
.gif-url-row{margin-bottom:1rem;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:500;}
.confirm-box{background:#fff;border-radius:6px;padding:1.5rem;max-width:320px;width:90%;text-align:center;}
.confirm-box p{font-size:0.9rem;color:#3a2c18;margin-bottom:1.25rem;line-height:1.5;}
.confirm-actions{display:flex;gap:0.75rem;justify-content:center;}
.confirm-cancel{background:#fff;border:1px solid #ddd5c5;border-radius:3px;padding:0.5rem 1.2rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;color:#555;}
.confirm-cancel:hover{background:#f5f0e8;}
.confirm-delete{background:#c04020;border:none;border-radius:3px;padding:0.5rem 1.2rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;color:#fff;}
.confirm-delete:hover{background:#a03010;}
</style>

<div class="hero">
  <div class="hero-eyebrow">A Fond Farewell</div>
  <h1>Goodbye, <em>Phil</em></h1>
  <p class="hero-sub">Wishing you all the best on your next adventure</p>
  <div class="hero-divider"></div>
</div>

<div class="form-section">
  <div class="form-card">
    <h2>Leave your message</h2>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Your name</label>
        <input class="form-input" id="f-name" placeholder="Jane Smith" maxlength="60" />
      </div>
      <div class="form-group">
        <label class="form-label">Your role / team (optional)</label>
        <input class="form-input" id="f-role" placeholder="Engineering Team" maxlength="60" />
      </div>
    </div>
    <div class="form-group" style="margin-bottom:1rem;">
      <label class="form-label">Your message</label>
      <textarea class="form-textarea" id="f-msg" placeholder="Share a memory, a wish, or just say goodbye…" maxlength="500"></textarea>
    </div>
    <div class="emoji-label">Pick an emoji</div>
    <div class="emoji-row" id="emoji-row">
      <div class="emoji-btn active" data-e="🎊">🎊</div>
      <div class="emoji-btn" data-e="⭐">⭐</div>
      <div class="emoji-btn" data-e="🥂">🥂</div>
      <div class="emoji-btn" data-e="🍾">🍾</div>
      <div class="emoji-btn" data-e="💛">💛</div>
      <div class="emoji-btn" data-e="🚀">🚀</div>
      <div class="emoji-btn" data-e="🌈">🌈</div>
      <div class="emoji-btn" data-e="🙌">🙌</div>
      <div class="emoji-btn" data-e="✨">✨</div>
      <div class="emoji-btn" data-e="🏆">🏆</div>
    </div>
    <div class="selected-preview" id="selected-preview">Selected: <span id="selected-emoji-display">🎊</span></div>
    <div class="media-row">
      <label class="upload-btn">📷 Add photo / video<input type="file" accept="image/*,video/*" id="photo-input" /></label>
      <label class="upload-btn">🎞️ Add a GIF<input type="file" accept=".gif,image/gif" id="gif-input" /></label>
    </div>
    <div class="gif-url-row">
      <label class="form-label">Or paste a GIF URL</label>
      <input class="form-input" id="f-gifurl" placeholder="https://media.giphy.com/..." style="width:100%;margin-top:5px;" />
    </div>
    <div id="media-preview" class="media-preview" style="display:none;margin-bottom:1rem;"></div>
    <button class="submit-btn" id="submit-btn"><span class="star">✦</span> Sign the card</button>
  </div>
</div>

<div class="msgs-section">
  <div class="msgs-header">
    <h2>Messages for Phil</h2>
    <span class="sig-count" id="sig-count">0 signatures</span>
  </div>
  <div class="cards-grid" id="cards-grid">
    <p class="empty-msg">Be the first to sign Phil's card!</p>
  </div>
</div>

<div id="confirm-overlay" class="confirm-overlay" style="display:none;">
  <div class="confirm-box">
    <p>Are you sure you want to remove this message from the board?</p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="cancel-delete-btn">Cancel</button>
      <button class="confirm-delete" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<script>
(function () {
  const STORAGE_KEY = 'phil_farewell_v2';
  let cards = [];
  let selectedEmoji = '🎊';
  let pendingMedia = null;
  let pendingDeleteIdx = null;
  let isSaving = false; // guard: block polls while a save is in flight

  // ── Emoji picker ──────────────────────────────────────────
  document.getElementById('emoji-row').addEventListener('click', function (e) {
    const btn = e.target.closest('[data-e]');
    if (!btn) return;
    this.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedEmoji = btn.getAttribute('data-e');
    document.getElementById('selected-emoji-display').textContent = selectedEmoji;
  });

  // ── File upload ───────────────────────────────────────────
  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      pendingMedia = { data: e.target.result, type: file.type.startsWith('video') ? 'video' : 'image' };
      const prev = document.getElementById('media-preview');
      prev.style.display = 'block';
      prev.innerHTML = pendingMedia.type === 'video'
        ? `<video src="${e.target.result}" controls muted style="max-height:80px;width:100%;"></video>`
        : `<img src="${e.target.result}" style="max-height:80px;width:100%;object-fit:cover;" />`;
    };
    reader.readAsDataURL(file);
  }
  document.getElementById('photo-input').addEventListener('change', function () { handleFile(this); });
  document.getElementById('gif-input').addEventListener('change', function () { handleFile(this); });

  // ── Submit ────────────────────────────────────────────────
  document.getElementById('submit-btn').addEventListener('click', async function () {
    const name = document.getElementById('f-name').value.trim();
    const role = document.getElementById('f-role').value.trim();
    const msg = document.getElementById('f-msg').value.trim();
    const gifUrl = document.getElementById('f-gifurl').value.trim();
    if (!name) { toast('Please enter your name'); return; }
    if (!msg && !pendingMedia && !gifUrl) { toast('Add a message or media'); return; }

    const newCard = {
      author: name,
      role,
      message: msg,
      emoji: selectedEmoji,
      media: pendingMedia ? pendingMedia.data : (gifUrl || null),
      mediaType: pendingMedia ? pendingMedia.type : (gifUrl ? 'image' : null),
      ts: Date.now()
    };

    cards.push(newCard);
    render(); // show immediately in UI

    // save with guard so poll doesn't clobber
    isSaving = true;
    try { await window.storage.set(STORAGE_KEY, JSON.stringify({ cards }), true); }
    catch (e) { toast('⚠️ Could not save message'); }
    finally { isSaving = false; }

    // reset form
    document.getElementById('f-name').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-msg').value = '';
    document.getElementById('f-gifurl').value = '';
    document.getElementById('media-preview').style.display = 'none';
    document.getElementById('media-preview').innerHTML = '';
    pendingMedia = null;
    toast('✦ Your message has been added!');
  });

  // ── Delete ────────────────────────────────────────────────
  document.getElementById('cancel-delete-btn').addEventListener('click', function () {
    pendingDeleteIdx = null;
    document.getElementById('confirm-overlay').style.display = 'none';
  });

  document.getElementById('confirm-delete-btn').addEventListener('click', async function () {
    if (pendingDeleteIdx === null) return;
    cards.splice(pendingDeleteIdx, 1);
    pendingDeleteIdx = null;
    document.getElementById('confirm-overlay').style.display = 'none';
    render();
    isSaving = true;
    try { await window.storage.set(STORAGE_KEY, JSON.stringify({ cards }), true); }
    catch (e) {}
    finally { isSaving = false; }
    toast('Message removed');
  });

  // ── Render ────────────────────────────────────────────────
  function render() {
    document.getElementById('sig-count').textContent = cards.length + ' signature' + (cards.length !== 1 ? 's' : '');
    const grid = document.getElementById('cards-grid');
    if (!cards.length) {
      grid.innerHTML = '<p class="empty-msg">Be the first to sign Phil\'s card!</p>';
      return;
    }
    grid.innerHTML = cards.map((c, i) => {
      const mediaHTML = c.media
        ? (c.mediaType === 'video'
          ? `<div class="msg-card-media"><video src="${c.media}" controls muted playsinline></video></div>`
          : `<div class="msg-card-media"><img src="${c.media}" loading="lazy"/></div>`)
        : '';
      return `<div class="msg-card">
        <div class="delete-btn" data-idx="${i}" title="Remove">✕</div>
        ${mediaHTML}
        <span class="msg-emoji">${c.emoji}</span>
        ${c.message ? `<p class="msg-text">'${c.message}'</p>` : ''}
        <div class="msg-sig">
          <div class="msg-author">${c.author}</div>
          ${c.role ? `<div class="msg-role">${c.role}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        pendingDeleteIdx = parseInt(this.getAttribute('data-idx'));
        document.getElementById('confirm-overlay').style.display = 'flex';
      });
    });
  }

  // ── Poll for new messages from others ────────────────────
  async function poll() {
    if (isSaving) return; // don't overwrite while we're mid-save
    try {
      const r = await window.storage.get(STORAGE_KEY, true);
      const remote = r ? JSON.parse(r.value).cards || [] : [];
      if (remote.length !== cards.length) {
        const wasMore = remote.length > cards.length;
        cards = remote;
        render();
        if (wasMore) toast('✨ New message added!');
      }
    } catch (e) {}
  }

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    try {
      const r = await window.storage.get(STORAGE_KEY, true);
      cards = r ? JSON.parse(r.value).cards || [] : [];
    } catch (e) { cards = []; }
    render();
    setInterval(poll, 6000);
  }

  init();
})();
</script>
